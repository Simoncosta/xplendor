# -----------------------------------
# HTTP → redireciona para HTTPS
# -----------------------------------
server {
    listen 80;
    server_name xplendor.tech www.xplendor.tech;

    return 301 https://$host$request_uri;
}

# -----------------------------------
# HTTPS
# -----------------------------------
server {
    listen 443 ssl;
    server_name xplendor.tech www.xplendor.tech;

    ssl_certificate /etc/letsencrypt/live/xplendor.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xplendor.tech/privkey.pem;

    client_max_body_size 700M;

    # -------------------------
    # FRONTEND (React)
    # -------------------------
    root /var/www/web/build;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # -------------------------
    # STORAGE público
    # -------------------------
    location ^~ /storage/ {
        alias /var/www/html/public/storage/;

        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # -------------------------
    # API Laravel
    # -------------------------
    location ^~ /api/ {
        root /var/www/html/public;
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/api/.*\.php$ {
        root /var/www/html/public;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass php:9000;
    }

    # -------------------------
    # Assets cache
    # -------------------------
    location ~* \.(css|js|jpg|jpeg|png|webp|gif|svg|ico|woff|woff2)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}