server {
  listen 80;
  server_name xplendor.pt www.xplendor.pt;

  # --- FRONTEND (React build) ---
  root /var/www/xplendor/web/build;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  # --- STORAGE público (para sites externos consumirem) ---
  location /storage/ {
    alias /var/www/xplendor/server/public/storage/;

    # CORS para consumo externo (imagens)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept" always;

    # cache forte para imagens
    expires 30d;
    access_log off;
  }

  # --- API reverse proxy para o container api (localhost:8081) ---
  location /api/ {
    proxy_pass http://127.0.0.1:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 50m;
  }
}